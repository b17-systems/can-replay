# Configuration for prek (https://prek.j178.dev). YAML users can use `.pre-commit-config.yaml` instead.
#:schema https://www.schemastore.org/prek.json

[default_language_version]
python = "3.14"

# Default starter suite: fast builtin hygiene checks (offline, no clone).
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-added-large-files" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.7"
hooks = [{ id = "uv-lock" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.11"
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

# ty has no published hook repo yet; run via project env so third-party imports resolve.
[[repos]]
repo = "local"

[[repos.hooks]]
id = "ty"
name = "ty"
language = "system"
entry = "uv run ty check"
pass_filenames = false
types = ["python"]
